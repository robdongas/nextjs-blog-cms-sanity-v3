# Deploy to Digital Ocean Droplet on push to main.
# Builds in CI (to avoid OOM on the droplet), then deploys the
# pre-built dist/ via SSH and restarts the app with PM2.
#
# Required repo secrets:
#   DROPLET_ID, DROPLET_USER, SSH_PRIVATE_KEY
#   PUBLIC_SANITY_PROJECT_ID, PUBLIC_SANITY_DATASET, PUBLIC_SANITY_API_VERSION
#   PUBLIC_URL, PUBLIC_SANITY_PROJECT_TITLE, PUBLIC_GA_ID
#   SANITY_API_READ_TOKEN
name: Deploy to DO

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ secrets.PUBLIC_SANITY_DATASET }}
          PUBLIC_SANITY_API_VERSION: ${{ secrets.PUBLIC_SANITY_API_VERSION }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          PUBLIC_SANITY_PROJECT_TITLE: ${{ secrets.PUBLIC_SANITY_PROJECT_TITLE }}
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

      - name: Deploy to Droplet
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DROPLET_ID }}
          REMOTE_USER: ${{ secrets.DROPLET_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=120 -i ~/.ssh/deploy_key"
          REMOTE="${REMOTE_USER}@${REMOTE_HOST}"

          # Pipe compressed dist/ to the droplet over a single SSH connection
          tar czf - dist/ | ssh $SSH_OPTS "$REMOTE" \
            'rm -rf /var/www/html/dist && tar xzf - -C /var/www/html/'

          # Pull latest code, install production deps, restart PM2
          ssh $SSH_OPTS "$REMOTE" bash -s <<'REMOTE_SCRIPT'
            set -e
            cd /var/www/html
            git pull origin main
            npm ci --omit=dev
            pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
          REMOTE_SCRIPT

          rm -f ~/.ssh/deploy_key
